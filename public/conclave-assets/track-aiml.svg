<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" fill="none">
  <defs>
    <radialGradient id="mbg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d0a1a"/>
      <stop offset="100%" stop-color="#020003"/>
    </radialGradient>
    <filter id="mglow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="mglow2"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="mglow3"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="600" height="300" fill="url(#mbg)"/>
  <!-- Neural network connections -->
  <g stroke="#00f0ff" stroke-width="0.8" opacity="0.25" filter="url(#mglow)">
    <!-- Layer 1 to Layer 2 -->
    <line x1="150" y1="60" x2="250" y2="80"/>
    <line x1="150" y1="60" x2="250" y2="150"/>
    <line x1="150" y1="60" x2="250" y2="220"/>
    <line x1="150" y1="150" x2="250" y2="80"/>
    <line x1="150" y1="150" x2="250" y2="150"/>
    <line x1="150" y1="150" x2="250" y2="220"/>
    <line x1="150" y1="240" x2="250" y2="80"/>
    <line x1="150" y1="240" x2="250" y2="150"/>
    <line x1="150" y1="240" x2="250" y2="220"/>
  </g>
  <g stroke="#a855f7" stroke-width="0.8" opacity="0.25" filter="url(#mglow)">
    <!-- Layer 2 to Layer 3 -->
    <line x1="250" y1="80" x2="350" y2="100"/>
    <line x1="250" y1="80" x2="350" y2="200"/>
    <line x1="250" y1="150" x2="350" y2="100"/>
    <line x1="250" y1="150" x2="350" y2="200"/>
    <line x1="250" y1="220" x2="350" y2="100"/>
    <line x1="250" y1="220" x2="350" y2="200"/>
    <!-- Layer 3 to Layer 4 -->
    <line x1="350" y1="100" x2="450" y2="150"/>
    <line x1="350" y1="200" x2="450" y2="150"/>
  </g>
  <!-- Neural nodes - Layer 1 (Input) -->
  <g filter="url(#mglow2)">
    <circle cx="150" cy="60" r="10" fill="rgba(0,240,255,0.12)" stroke="#00f0ff" stroke-width="1.2"/>
    <circle cx="150" cy="60" r="4" fill="#00f0ff" opacity="0.6"/>
    <circle cx="150" cy="150" r="10" fill="rgba(0,240,255,0.12)" stroke="#00f0ff" stroke-width="1.2"/>
    <circle cx="150" cy="150" r="4" fill="#00f0ff" opacity="0.6"/>
    <circle cx="150" cy="240" r="10" fill="rgba(0,240,255,0.12)" stroke="#00f0ff" stroke-width="1.2"/>
    <circle cx="150" cy="240" r="4" fill="#00f0ff" opacity="0.6"/>
  </g>
  <!-- Neural nodes - Layer 2 (Hidden) -->
  <g filter="url(#mglow2)">
    <circle cx="250" cy="80" r="12" fill="rgba(168,85,247,0.1)" stroke="#a855f7" stroke-width="1.2"/>
    <circle cx="250" cy="80" r="5" fill="#a855f7" opacity="0.5"/>
    <circle cx="250" cy="150" r="12" fill="rgba(168,85,247,0.1)" stroke="#a855f7" stroke-width="1.2"/>
    <circle cx="250" cy="150" r="5" fill="#a855f7" opacity="0.5"/>
    <circle cx="250" cy="220" r="12" fill="rgba(168,85,247,0.1)" stroke="#a855f7" stroke-width="1.2"/>
    <circle cx="250" cy="220" r="5" fill="#a855f7" opacity="0.5"/>
  </g>
  <!-- Neural nodes - Layer 3 -->
  <g filter="url(#mglow2)">
    <circle cx="350" cy="100" r="11" fill="rgba(0,240,255,0.1)" stroke="#00f0ff" stroke-width="1.2"/>
    <circle cx="350" cy="100" r="4.5" fill="#00f0ff" opacity="0.55"/>
    <circle cx="350" cy="200" r="11" fill="rgba(0,240,255,0.1)" stroke="#00f0ff" stroke-width="1.2"/>
    <circle cx="350" cy="200" r="4.5" fill="#00f0ff" opacity="0.55"/>
  </g>
  <!-- Output node -->
  <g filter="url(#mglow3)">
    <circle cx="450" cy="150" r="16" fill="rgba(168,85,247,0.08)" stroke="#a855f7" stroke-width="1.5"/>
    <circle cx="450" cy="150" r="7" fill="#a855f7" opacity="0.6"/>
    <circle cx="450" cy="150" r="24" fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.2" stroke-dasharray="3 3"/>
  </g>
  <!-- Brain outline hint -->
  <path d="M280 148 Q300 90 330 148 Q360 90 380 148" stroke="#00f0ff" stroke-width="0.6" fill="none" opacity="0.08" filter="url(#mglow)"/>
  <!-- Floating particles -->
  <circle cx="80" cy="100" r="2" fill="#00f0ff" opacity="0.3" filter="url(#mglow2)"/>
  <circle cx="530" cy="80" r="2.5" fill="#a855f7" opacity="0.3" filter="url(#mglow2)"/>
  <circle cx="520" cy="240" r="2" fill="#00f0ff" opacity="0.25" filter="url(#mglow2)"/>
  <circle cx="70" cy="250" r="3" fill="#a855f7" opacity="0.2" filter="url(#mglow2)"/>
</svg>
