<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" fill="none">
  <defs>
    <radialGradient id="wbg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#020003"/>
    </radialGradient>
    <filter id="wglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wglow2">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="wcyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#0088ff"/>
    </linearGradient>
    <linearGradient id="wpurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#wbg)"/>
  <!-- Grid lines -->
  <g opacity="0.06" stroke="#00f0ff">
    <line x1="0" y1="60" x2="600" y2="60"/>
    <line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="180" x2="600" y2="180"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/>
  </g>
  <!-- Browser window -->
  <g filter="url(#wglow)" transform="translate(150, 40)">
    <rect x="0" y="0" width="300" height="210" rx="12" stroke="url(#wcyan)" stroke-width="1.5" fill="rgba(0,240,255,0.03)"/>
    <!-- Title bar -->
    <rect x="0" y="0" width="300" height="32" rx="12" fill="rgba(0,240,255,0.06)"/>
    <rect x="0" y="20" width="300" height="12" fill="rgba(0,240,255,0.06)"/>
    <circle cx="18" cy="16" r="5" fill="#ff5f57" opacity="0.7"/>
    <circle cx="36" cy="16" r="5" fill="#febc2e" opacity="0.7"/>
    <circle cx="54" cy="16" r="5" fill="#28c840" opacity="0.7"/>
    <!-- URL bar -->
    <rect x="80" y="9" width="140" height="14" rx="7" fill="rgba(255,255,255,0.06)"/>
  </g>
  <!-- Code lines inside browser -->
  <g transform="translate(170, 88)" filter="url(#wglow)">
    <!-- Code bracket < /> -->
    <text x="40" y="45" font-family="monospace" font-size="42" fill="url(#wcyan)" opacity="0.9">&lt;</text>
    <text x="70" y="45" font-family="monospace" font-size="42" fill="url(#wpurple)" opacity="0.9">/</text>
    <text x="95" y="45" font-family="monospace" font-size="42" fill="url(#wcyan)" opacity="0.9">&gt;</text>
    <!-- Code lines -->
    <rect x="20" y="65" width="120" height="4" rx="2" fill="#00f0ff" opacity="0.35"/>
    <rect x="40" y="78" width="80" height="4" rx="2" fill="#a855f7" opacity="0.3"/>
    <rect x="40" y="91" width="100" height="4" rx="2" fill="#00f0ff" opacity="0.2"/>
    <rect x="20" y="104" width="60" height="4" rx="2" fill="#a855f7" opacity="0.25"/>
    <rect x="20" y="117" width="140" height="4" rx="2" fill="#00f0ff" opacity="0.15"/>
    <rect x="40" y="130" width="90" height="4" rx="2" fill="#a855f7" opacity="0.2"/>
  </g>
  <!-- Floating elements -->
  <circle cx="100" cy="80" r="3" fill="#00f0ff" opacity="0.4" filter="url(#wglow2)"/>
  <circle cx="500" cy="200" r="4" fill="#a855f7" opacity="0.35" filter="url(#wglow2)"/>
  <circle cx="520" cy="100" r="2" fill="#00f0ff" opacity="0.3" filter="url(#wglow2)"/>
  <circle cx="80" cy="220" r="2.5" fill="#a855f7" opacity="0.3" filter="url(#wglow2)"/>
</svg>
