    <text x="60" y="140" font-family="monospace" font-size="9" fill="#a855f7">11010010</text>
    <text x="60" y="200" font-family="monospace" font-size="9" fill="#00f0ff">00110101</text>
    <text x="430" y="100" font-family="monospace" font-size="9" fill="#a855f7">10110100</text>
