<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" fill="none">
  <defs>
    <radialGradient id="fbg" cx="50%" cy="50%" r="70%"><stop offset="0%" stop-color="#0a0a1a"/><stop offset="100%" stop-color="#020003"/></radialGradient>
    <filter id="fg"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="fg2"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="600" height="300" fill="url(#fbg)"/>
  <!-- Grid -->
  <g opacity="0.04" stroke="#00f0ff"><line x1="0" y1="75" x2="600" y2="75"/><line x1="0" y1="150" x2="600" y2="150"/><line x1="0" y1="225" x2="600" y2="225"/></g>
  <!-- Chart area -->
  <g filter="url(#fg)" transform="translate(120,30)">
    <rect x="0" y="0" width="360" height="230" rx="10" stroke="rgba(0,240,255,0.15)" stroke-width="0.8" fill="rgba(0,240,255,0.01)"/>
    <!-- Y-axis labels -->
    <text x="10" y="40" font-family="monospace" font-size="8" fill="#00f0ff" opacity="0.3">100K</text>
    <text x="10" y="90" font-family="monospace" font-size="8" fill="#00f0ff" opacity="0.3">75K</text>
    <text x="10" y="140" font-family="monospace" font-size="8" fill="#00f0ff" opacity="0.3">50K</text>
    <text x="10" y="190" font-family="monospace" font-size="8" fill="#00f0ff" opacity="0.3">25K</text>
    <!-- Gridlines -->
    <line x1="45" y1="36" x2="345" y2="36" stroke="#00f0ff" stroke-width="0.3" opacity="0.1"/>
    <line x1="45" y1="86" x2="345" y2="86" stroke="#00f0ff" stroke-width="0.3" opacity="0.1"/>
    <line x1="45" y1="136" x2="345" y2="136" stroke="#00f0ff" stroke-width="0.3" opacity="0.1"/>
    <line x1="45" y1="186" x2="345" y2="186" stroke="#00f0ff" stroke-width="0.3" opacity="0.1"/>
    <!-- Area chart fill -->
    <path d="M45 180 L95 160 L145 140 L195 100 L245 110 L295 60 L345 45 L345 210 L45 210 Z" fill="rgba(0,240,255,0.04)"/>
    <!-- Line chart -->
    <polyline points="45,180 95,160 145,140 195,100 245,110 295,60 345,45" stroke="#00f0ff" stroke-width="2" fill="none" filter="url(#fg)"/>
    <!-- Data points -->
    <circle cx="45" cy="180" r="3" fill="#00f0ff" opacity="0.6"/>
    <circle cx="95" cy="160" r="3" fill="#00f0ff" opacity="0.6"/>
    <circle cx="145" cy="140" r="3" fill="#00f0ff" opacity="0.6"/>
    <circle cx="195" cy="100" r="3.5" fill="#a855f7" opacity="0.7"/>
    <circle cx="245" cy="110" r="3" fill="#00f0ff" opacity="0.6"/>
    <circle cx="295" cy="60" r="3" fill="#00f0ff" opacity="0.6"/>
    <circle cx="345" cy="45" r="4" fill="#a855f7" opacity="0.7"/>
    <!-- Second line (purple) -->
    <polyline points="45,200 95,185 145,175 195,155 245,162 295,130 345,120" stroke="#a855f7" stroke-width="1.2" fill="none" opacity="0.5" stroke-dasharray="4 3"/>
  </g>
  <!-- Currency symbols -->
  <g filter="url(#fg2)" opacity="0.25">
    <text x="80" y="90" font-family="sans-serif" font-size="28" fill="#00f0ff">₹</text>
    <text x="510" y="220" font-family="sans-serif" font-size="22" fill="#a855f7">$</text>
    <text x="520" y="80" font-family="sans-serif" font-size="18" fill="#00f0ff">€</text>
  </g>
  <circle cx="60" cy="260" r="2" fill="#a855f7" opacity="0.3" filter="url(#fg2)"/>
  <circle cx="550" cy="280" r="2" fill="#00f0ff" opacity="0.2" filter="url(#fg2)"/>
</svg>
